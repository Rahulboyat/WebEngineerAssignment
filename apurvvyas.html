<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment</title>
    <style>
      .red-circle {
        width: 80px;
        height: 80px;
        top: 120px;
        -webkit-border-radius: 25px;
        -moz-border-radius: 25px;
        border-radius: 55%;
        background: red;
        margin-left: 30%;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .yellow-circle {
        width: 80px;
        height: 80px;
        -webkit-border-radius: 25px;
        -moz-border-radius: 25px;
        border-radius: 55%;
        background: yellow;
        margin-left: 280%;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .green-circle {
        width: 80px;
        height: 80px;
        top: 240px;
        -webkit-border-radius: 25px;
        -moz-border-radius: 25px;
        border-radius: 55%;
        background: green;
        margin-left: 30%;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .blue-circle {
        width: 80px;
        height: 80px;
        top: 240px;
        -webkit-border-radius: 25px;
        -moz-border-radius: 25px;
        border-radius: 55%;
        background: blue;
        margin-left: 280%;
        align-items: center;
        justify-content: center;
      }
      .start-btn {
          background-color: #195f1b;
          color: white;
          padding: 7px 26px;
          text-align: center;
          text-decoration: none;
          display:inline-block;
          font-size: 15px;
          cursor: pointer;
          margin-left: 30%;
          width: 84px;
          height: 35px;
          margin-top: 300px;
          align-items: center;
        justify-content: center;
      }
      .stop-btn {
        background-color: #195f1b;
          color: white;
          padding: 7px 24px;
          text-align: center;
          text-decoration: none;
          display:inline-block;
          font-size: 15px;
          cursor: pointer;
          margin-left: 9%;
          width: 84px;
          height: 35px;
          margin-top: 300px;
          align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="red-circle">
      <div class="yellow-circle"></div>
    </div>
    <div class="green-circle">
      <div class="blue-circle"></div>
    </div>
    <button class="start-btn">Start
        <button class="stop-btn">Stop</button>
    </button>
  </body>
</html>
